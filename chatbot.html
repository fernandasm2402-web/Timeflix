<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chatbot</title>
    <link rel="stylesheet" href="styles.css" >
</head>
<body>
<div class="chatbot-widget" id="chatbot-widget"> <!--/div>widget flutuante do chatbot-->
     <botton>
     id="chatbot-toggle"
     class="chatboot-toggle"
     aria-label="abrir chat com LuzIA">🗨️</button> <!--Botão flutuante do chatbot-->
  <div class="chatbot-window" id="chatbot-window"> <!--Janela do chat-->
     <header class="chatbot-header">
    <div class="chatbot-header-info">
    <div class="chatbot-avatar">L</div>
    </div>   
<div class="chatbot-title">LuzIA</div>
<div class="chatbot-subtitle">Assistente do Sistema de Vídeo></vídeo></div>
    </div>
  </div>  
    <button class="chatbot-close" id="chatbot-close" aria-label="Fechar chat">
        🦕
</button>
</header>
<div class="chatbot-messages" id="chatbot-messages"> <!--Mensagens do chat serão visualizadas-->
</div>
<form class="chatbot-form" id="chatbot-form"> </form>
    <input
    type="text"
    id="chatbot-input"
    class="chatbot-input"
    placeholder="Digite sua pergunta..."
    autocomplete="on"
    required
    >
    <button type="submit"class="chatbot-send-btn">🗨️</button>
</form>
</div>
</div>
<div vw class="enable">
    <div vw-access-button class="active"></div>
    <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
